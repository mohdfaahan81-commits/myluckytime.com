<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mera Calculator</title>
<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Arial', sans-serif;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #667eea, #764ba2);
  }

  .calculator {
    background: #1e1e1e;
    padding: 25px;
    border-radius: 50px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    width: 420px;
  }
  

  #display {
    width: 100%;
    height: 80px;
    background: #2d2d2d;
    color: #fff;
    font-size: 32px;
    text-align: right;
    border: none;
    border-radius: 12px;
    padding: 15px;
    margin-bottom: 20px;
    outline: none;
  }

  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }

  button {
    height: 65px;
    font-size: 22px;
    font-weight: bold;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: #3a3a3a;
    color: white;
    transition: all 0.2s;
  }

  button:active {
    transform: scale(0.95);
  }

  button:hover {
    background: #4a4a4a;
  }

  .operator {
    background: #ff9500;
    color: white;
  }
  .operator:hover {
    background: #ffb143;
  }

  .clear {
    background: #ff3b30;
  }
  .clear:hover {
    background: #ff5e54;
  }

  .equal {
    background: #34c759;
    grid-column: span 2;
  }
  .equal:hover {
    background: #48d46a;
  }

  .zero {
    grid-column: span 2;
  }
</style>
</head>
<body>

<div class="calculator">
  <input type="text" id="display" placeholder="0" disabled>

  <div class="buttons">
    <button class="clear" onclick="clearDisplay()">C</button>
    <button onclick="deleteLast()">DEL</button>
    <button class="operator" onclick="appendValue('%')">%</button>
    <button class="operator" onclick="appendValue('/')">/</button>

    <button onclick="appendValue('7')">7</button>
    <button onclick="appendValue('8')">8</button>
    <button onclick="appendValue('9')">9</button>
    <button class="operator" onclick="appendValue('*')">×</button>

    <button onclick="appendValue('4')">4</button>
    <button onclick="appendValue('5')">5</button>
    <button onclick="appendValue('6')">6</button>
    <button class="operator" onclick="appendValue('-')">-</button>

    <button onclick="appendValue('1')">1</button>
    <button onclick="appendValue('2')">2</button>
    <button onclick="appendValue('3')">3</button>
    <button class="operator" onclick="appendValue('+')">+</button>

    <button class="zero" onclick="appendValue('0')">0</button>
    <button onclick="appendValue('.')">.</button>
    <button class="equal" onclick="calculate()">=</button>
  </div>
</div>

<script>
  let display = document.getElementById('display');

  function appendValue(value) {
    display.value += value;
  }

  function clearDisplay() {
    display.value = '';
  }

  function deleteLast() {
    display.value = display.value.slice(0, -1);
  }

  function calculate() {
    try {
      if(display.value === '') return;
      display.value = eval(display.value);
    } catch {
      display.value = 'Error';
      setTimeout(() => { display.value = ''; }, 1000);
    }
  }

  // Keyboard se bhi chale
  document.addEventListener('keydown', (event) => {
    if(event.key >= '0' && event.key <= '9') appendValue(event.key);
    if(['+', '-', '*', '/', '.', '%'].includes(event.key)) appendValue(event.key);
    if(event.key === 'Enter') calculate();
    if(event.key === 'Backspace') deleteLast();
    if(event.key === 'Escape') clearDisplay();
  });
</script>

</body>
</html>
